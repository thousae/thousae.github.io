<header class="topbar">
  <div class="topbar-contents">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav aria-label="Main navigation">
      {% for item in site.nav %}
        <a class="navlink" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
